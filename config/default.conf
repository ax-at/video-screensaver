# Video Screensaver Configuration

# Time in minutes before the screensaver activates due to inactivity
IDLE_TIMEOUT_MINUTES=5

# Key combination to exit the screensaver
# Supports any key combo that mpv understands (e.g., "Ctrl+Alt+c", "Ctrl+Shift+q", "ESC")
# See: https://mpv.io/manual/master/#input-conf
EXIT_KEY_COMBO="Ctrl+Alt+c"

# Path to the video file to display
# This can be any video file that mpv can play (e.g., .mp4, .webm, .mkv, .avi, etc.)
# Examples:
#   VIDEO_PATH="/home/username/Videos/my-screensaver.mp4"
#   VIDEO_PATH="/usr/share/backgrounds/my-video.webm"
# You MUST set this to a valid video file path
VIDEO_PATH=""
